name: Worker Jobs

on:
  schedule:
    - cron: "*/5 * * * *"   # runs every 5 minutes
  workflow_dispatch:        # allows manual trigger

jobs:
  worker:
    runs-on: ubuntu-latest

    steps:
      - name: Call Process Statements API
        run: |
          response=$(curl -s -w "\n%{http_code}" "${{ secrets.BASE_URL }}/api/worker/process-statements?secret=${{ secrets.WORKER_SECRET }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          
          echo "Response Status: $status"
          echo "Response Body: $body"
          
          if [ "$status" -ne 200 ]; then
            echo "❌ API failed with status $status"
            exit 1
          fi
          

      - name: Call Analyze Finances API (hourly only)
        run: |
          MINUTE=$(date +%M)

          if [ "$MINUTE" = "00" ]; then
            echo "Running hourly analysis..."
            response=$(curl -s -w "\n%{http_code}" -X GET "${{ secrets.BASE_URL }}/api/worker/analyze-finances?secret=${{ secrets.WORKER_SECRET }}")
            body=$(echo "$response" | head -n -1)
            status=$(echo "$response" | tail -n 1)
            
            echo "Analysis API Status: $status"
            if [ -n "$body" ]; then
              echo "Analysis Response: $body"
            fi
            
            if [ "$status" -ne 200 ]; then
              echo "❌ Analyze Finances API failed with status $status"
              exit 1
            fi
            echo "✅ Analyze Finances API succeeded"
          else
            echo "Skipping analysis this run"
          fi